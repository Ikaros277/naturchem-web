backend:
  name: github
  repo: Ikaros277/naturchem-web
  branch: main
  base_url: https://www.naturchem.cz
  auth_endpoint: api/decap/auth

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "poradna"
    label: "Poradna"
    folder: "content/articles"
    create: true
    extension: md
    format: frontmatter
    slug: "{{fields.slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Nadpis", name: "title", widget: "string" }
      - {
          label: "Slug (URL, bez diakritiky)",
          name: "slug",
          widget: "string",
          hint: "Musí odpovídat názvu souboru, např. novela-zakona-o-ochrane-ovzdusi-2025",
          pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "Malá písmena, číslice a pomlčky."]
        }
      - { label: "Perex", name: "excerpt", widget: "text" }
      - { label: "Autor", name: "author", widget: "string", default: "NATURCHEM" }
      - {
          label: "Stav publikace",
          name: "status",
          widget: "select",
          options:
            [
              { label: "Publikovat (podle data níže)", value: "published" },
              { label: "Koncept (skrytý na webu)", value: "draft" }
            ],
          default: "published",
          hint: "Koncept = článek se na webu neukáže, i když dáte Publish. Pro odložení nechte „Publikovat“ a níže nastavte budoucí datum."
        }
      - {
          label: "Datum publikace (i odložené)",
          name: "publishedAt",
          widget: "datetime",
          format: "YYYY-MM-DD",
          time_format: false,
          hint: "Budoucí datum = článek se na webu objeví až ten den (odložená publikace). Dnešní nebo minulé = hned po nasazení."
        }
      - {
          label: "Datum aktualizace",
          name: "updatedAt",
          widget: "datetime",
          format: "YYYY-MM-DD",
          time_format: false,
          required: false
        }
      - {
          label: "Téma",
          name: "topic",
          widget: "select",
          options:
            [
              "Emise",
              "Rozptylové studie",
              "Hluk",
              "Pracovní prostředí",
              "EIA a povolování",
              "Legislativa",
              "Chemická legislativa"
            ],
          required: false,
          hint: "Filtr v přehledu poradny a výchozí ikona. Pokud prázdné, odvodí se z nadpisu."
        }
      - {
          label: "Úvodní obrázek",
          name: "heroImage",
          widget: "image",
          required: false,
          hint: "Foto v hero pruhu a náhledu karty. Bez vyplnění se použije stock fotka podle tématu."
        }
      - { label: "Obsah", name: "body", widget: "markdown" }
